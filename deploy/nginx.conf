# Production reverse-proxy baseline. Replace the upstream address for the host.
limit_req_zone $binary_remote_addr zone=mtexam_login:10m rate=5r/m;
limit_req_zone $binary_remote_addr zone=mtexam_api:10m rate=30r/s;

server {
    listen 443 ssl http2;
    server_name exam.example.police.go.th;

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;
    ssl_session_timeout 1d;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Content-Type-Options nosniff always;
    add_header X-Frame-Options DENY always;
    add_header Referrer-Policy no-referrer always;

    location = /api/v1/auth/login {
        limit_req zone=mtexam_login burst=5 nodelay;
        proxy_pass http://mtexam_api;
        include proxy_params;
    }

    location /api/ {
        limit_req zone=mtexam_api burst=60 nodelay;
        proxy_pass http://mtexam_api;
        include proxy_params;
    }

    location / {
        proxy_pass http://mtexam_api;
        include proxy_params;
    }
}

upstream mtexam_api {
    server 127.0.0.1:8000;
    keepalive 32;
}
